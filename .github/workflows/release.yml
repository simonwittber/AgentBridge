name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Validate package.json version matches tag
        run: |
          PKG=$(jq -r '.version' package.json)
          TAG=${{ steps.version.outputs.version }}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG)"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'Harness~/dffrnt-agent/go.mod'
          cache-dependency-path: 'Harness~/dffrnt-agent/go.sum'

      - name: Build binaries
        run: |
          cd "Harness~/dffrnt-agent"
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dffrnt-agent-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dffrnt-agent-linux-amd64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dffrnt-agent-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dffrnt-agent-darwin-arm64 .

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Append MCP context size to release notes
        run: |
          cd "Harness~/dffrnt-agent"
          go test -v ./contextsize/ 2>&1 \
            | grep -E 'context_size_test\.go:[0-9]+:' \
            | sed 's/[[:space:]]*context_size_test\.go:[0-9]*:[[:space:]]*//' \
            > /tmp/ctx.txt
          echo "" >> ../../release_notes.md
          echo "### MCP context size" >> ../../release_notes.md
          printf '```\n' >> ../../release_notes.md
          cat /tmp/ctx.txt >> ../../release_notes.md
          printf '```\n' >> ../../release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            Harness~/dffrnt-agent/dffrnt-agent-windows-amd64.exe
            Harness~/dffrnt-agent/dffrnt-agent-linux-amd64
            Harness~/dffrnt-agent/dffrnt-agent-darwin-amd64
            Harness~/dffrnt-agent/dffrnt-agent-darwin-arm64
